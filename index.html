<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizr</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7c8cf8;
      margin-bottom: 2.5rem;
    }

    /* Upload state */
    #upload-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    #drop-zone {
      width: 340px;
      height: 180px;
      border: 2px dashed #3a3f5c;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      padding: 1.5rem;
      text-align: center;
    }

    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #7c8cf8;
      background: #1a1d2e;
    }

    #drop-zone svg {
      opacity: 0.5;
    }

    #drop-zone p {
      color: #8890b0;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    #drop-zone span {
      color: #7c8cf8;
      font-weight: 500;
    }

    #file-input {
      display: none;
    }

    #upload-error {
      color: #f87c7c;
      font-size: 0.85rem;
      display: none;
    }

    /* Quiz state */
    #quiz-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      max-width: 600px;
    }

    #progress-bar-wrap {
      width: 100%;
      background: #1e2235;
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: #7c8cf8;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    #progress-label {
      font-size: 0.8rem;
      color: #5a6080;
      align-self: flex-end;
      margin-top: -1.2rem;
    }

    #term-card {
      width: 100%;
      background: #1a1d2e;
      border: 1px solid #2a2f4a;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      text-align: center;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
    }

    #term-text {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 600;
      line-height: 1.4;
      color: #e8eaf0;
    }

    #answer-text {
      font-size: 0.95rem;
      color: #8890b0;
      line-height: 1.6;
      max-width: 480px;
      display: none;
    }

    #done-text {
      font-size: 1.3rem;
      font-weight: 600;
      color: #7c8cf8;
      display: none;
    }

    .btn-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 0.65rem 1.6rem;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    #next-btn {
      background: #7c8cf8;
      color: #0f1117;
      font-weight: 700;
      min-width: 130px;
    }

    #next-btn:hover:not(:disabled) { opacity: 0.88; }

    #reset-btn {
      background: #1e2235;
      color: #8890b0;
      border: 1px solid #2a2f4a;
    }

    #reset-btn:hover { color: #e8eaf0; border-color: #3a3f5c; }

    #load-new-btn {
      background: transparent;
      color: #5a6080;
      border: 1px solid #2a2f4a;
      font-size: 0.85rem;
    }

    #load-new-btn:hover { color: #8890b0; }

    #file-name {
      font-size: 0.78rem;
      color: #3a4060;
    }
  </style>
</head>
<body>

<h1>Quizr</h1>

<!-- Upload -->
<div id="upload-section">
  <div id="drop-zone">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#7c8cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p>Drop an <span>.xlsx</span> file here<br>or <span>click to browse</span></p>
  </div>
  <input type="file" id="file-input" accept=".xlsx,.xls">
  <p id="upload-error"></p>
</div>

<!-- Quiz -->
<div id="quiz-section">
  <div id="progress-bar-wrap">
    <div id="progress-bar" style="width: 0%"></div>
  </div>
  <p id="progress-label">0 / 0 shown</p>

  <div id="term-card">
    <p id="term-text">—</p>
    <p id="answer-text"></p>
    <p id="done-text">All terms shown!</p>
  </div>

  <div class="btn-row">
    <button id="next-btn">Draw term</button>
    <button id="reset-btn">Shuffle &amp; restart</button>
    <button id="load-new-btn">Load new file</button>
  </div>
  <p id="file-name"></p>
</div>

<script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const uploadSection = document.getElementById('upload-section');
  const quizSection = document.getElementById('quiz-section');
  const termText = document.getElementById('term-text');
  const answerText = document.getElementById('answer-text');
  const doneText = document.getElementById('done-text');
  const nextBtn = document.getElementById('next-btn');
  const resetBtn = document.getElementById('reset-btn');
  const loadNewBtn = document.getElementById('load-new-btn');
  const progressBar = document.getElementById('progress-bar');
  const progressLabel = document.getElementById('progress-label');
  const fileNameEl = document.getElementById('file-name');
  const uploadError = document.getElementById('upload-error');

  let terms = [];
  let remaining = [];
  let shown = 0;

  // --- File loading ---
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });

  loadNewBtn.addEventListener('click', () => {
    quizSection.style.display = 'none';
    uploadSection.style.display = 'flex';
    fileInput.value = '';
  });

  function handleFile(file) {
    if (!file) return;
    if (!file.name.match(/\.xlsx?$/i)) {
      showError('Please upload an .xlsx file.');
      return;
    }

    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

        // Find term and optional answer columns by header name
        const header = rows[0] || [];
        let termCol = header.findIndex(h => typeof h === 'string' && h.trim().toLowerCase() === 'term');
        if (termCol === -1) termCol = 0;
        const answerCol = header.findIndex(h => typeof h === 'string' && h.trim().toLowerCase() === 'answer');

        const parsed = rows
          .slice(1)
          .filter(r => r[termCol] !== undefined && r[termCol] !== null && String(r[termCol]).trim() !== '')
          .map(r => ({
            term: String(r[termCol]).trim(),
            answer: answerCol !== -1 && r[answerCol] !== undefined && r[answerCol] !== null
              ? String(r[answerCol]).trim()
              : null,
          }));

        if (parsed.length === 0) {
          showError('No terms found in the file.');
          return;
        }

        terms = parsed;
        fileNameEl.textContent = file.name;
        uploadError.style.display = 'none';
        startQuiz();
      } catch {
        showError('Could not parse the file. Make sure it is a valid .xlsx.');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function showError(msg) {
    uploadError.textContent = msg;
    uploadError.style.display = 'block';
  }

  // --- Quiz logic ---
  function startQuiz() {
    uploadSection.style.display = 'none';
    quizSection.style.display = 'flex';
    resetQuiz();
  }

  function resetQuiz() {
    remaining = shuffle([...terms]);
    shown = 0;
    doneText.style.display = 'none';
    termText.style.display = 'block';
    termText.textContent = '—';
    answerText.style.display = 'none';
    answerText.textContent = '';
    nextBtn.disabled = false;
    updateProgress();
  }

  function drawTerm() {
    if (remaining.length === 0) return;
    const item = remaining.pop();
    shown++;
    termText.textContent = item.term;
    if (item.answer) {
      answerText.textContent = item.answer;
      answerText.style.display = 'block';
    } else {
      answerText.style.display = 'none';
    }
    updateProgress();

    if (remaining.length === 0) {
      nextBtn.disabled = true;
      termText.style.display = 'none';
      answerText.style.display = 'none';
      doneText.style.display = 'block';
      doneText.textContent = `"${item.term}" — all ${terms.length} terms shown!`;
    }
  }

  function updateProgress() {
    const pct = terms.length > 0 ? (shown / terms.length) * 100 : 0;
    progressBar.style.width = pct + '%';
    progressLabel.textContent = `${shown} / ${terms.length} shown`;
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  nextBtn.addEventListener('click', drawTerm);
  resetBtn.addEventListener('click', resetQuiz);
</script>
</body>
</html>
